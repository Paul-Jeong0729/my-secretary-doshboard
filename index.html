<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 비서 - Executive Cyber Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0d1527;
      color: #e2e8f0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      padding: 20px;
    }

    /* 상단 헤더 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid #1e293b;
    }

    .header h1 {
      font-size: 1.5rem;
      color: #f59e0b;
    }

    .header .date {
      color: #94a3b8;
      font-size: 0.95rem;
    }

    /* 메인 그리드 레이아웃 (시스템 정보 제거 후 2열/반응형 구성) */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
    }

    @media (max-width: 768px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
    }

    /* 카드 공통 스타일 */
    .card {
      background-color: #172033;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #38bdf8;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 비서 프로필 영역 */
    .secretary-card img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      object-fit: cover;
      margin-bottom: 12px;
    }

    .briefing-box {
      background-color: #0f172a;
      border: 1px solid #f59e0b;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.9rem;
      color: #cbd5e1;
      margin-top: auto;
    }

    /* 일정 영역 */
    .schedule-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .btn-add {
      background-color: #f59e0b;
      color: #000;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .btn-add:hover {
      background-color: #d97706;
    }

    .schedule-item {
      background-color: #0f172a;
      border-left: 4px solid #38bdf8;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    .schedule-date {
      font-size: 0.8rem;
      color: #f59e0b;
      font-weight: bold;
    }

    .schedule-time {
      font-size: 0.85rem;
      color: #38bdf8;
      margin-bottom: 4px;
    }

    .schedule-text {
      font-size: 0.95rem;
      color: #f8fafc;
    }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <header class="header">
    <h1>나의 비서 DASHBOARD V2.5</h1>
    <div class="date">2026.07.22 (수)</div>
  </header>

  <!-- 대시보드 메인 영역 -->
  <main class="dashboard-grid">
    
    <!-- 1. 수석 비서 카드 -->
    <section class="card secretary-card">
      <div class="card-title">
        <span>👩‍💼</span> 수석 비서 (대전)
      </div>
      <!-- 프로필 이미지 (필요시 이미지 경로 수정) -->
      <img src="https://via.placeholder.com/300x400" alt="수석 비서">
      
      <div class="briefing-box">
        <strong>💬 비서 브리핑:</strong><br>
        "새로운 일정을 홀로그램 입력 창에 등록해 보세요, 사랑하는 사장님!"
      </div>
    </section>

    <!-- 2. 오늘 일정 카드 -->
    <section class="card schedule-card">
      <div class="schedule-header">
        <div class="card-title" style="margin-bottom: 0;">
          <span>📅</span> 오늘 일정
        </div>
        <button class="btn-add">+ 일정 추가</button>
      </div>

      <!-- 일정 목록 -->
      <div class="schedule-list">
        <div class="schedule-item">
          <div class="schedule-date">07-20</div>
          <div class="schedule-time">09:30 AM</div>
          <div class="schedule-text">대전 사업소 주간 업무 보고</div>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
