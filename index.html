<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Secretary DashBoard V3.0</title>
  <!-- CSS 연결 -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/table1.css">
  <link rel="stylesheet" href="css/table2.css">
  <link rel="stylesheet" href="css/table3.css">
  <link rel="stylesheet" href="css/table4.css">
  <link rel="stylesheet" href="css/schedule-items.css">
</head>
<body>

  <div class="dashboard-main">
    
    <!-- 1번 테이블: 나의 비서 (헤더 영역) -->
    <header class="card table-1">
      <h1>My Secretary DashBoard <span>V3.0</span></h1>
    </header>

    <!-- 1번 아래 영역 (가로 스크롤 가능한 컨테이너) -->
    <div class="dashboard-scroll-wrapper">
      <div class="bottom-cards-container">
        
        <!-- 2번 테이블: 수석 비서 -->
        <section class="card table-2">
          <h2>👩‍💼 수석 비서</h2>
          <div class="secretary-avatar">
            <!-- 요일별 비서 이미지 -->
            <img id="secretary-img" src="" alt="수석 비서" class="secretary-img">
            <!-- 음성 읽는 중 표시될 아이콘 -->
            <div id="voice-status" class="voice-status hidden">
              <span class="sound-wave">🔊 음성 브리핑 중...</span>
            </div>
          </div>
          <div class="briefing-box">
            💡 <strong>비서 브리핑:</strong><br>
            <span id="briefing-text">"오늘도 즐겁고 힘찬 하루 보내십시오, 사랑하는 사장님!"</span>
          </div>
        </section>

        <!-- 3번 테이블: 오늘 일정 (제목 클릭 시 달력 모달 호출) -->
        <section class="card table-3">
          <div class="header-flex">
            <h2 id="calendar-trigger" style="cursor: pointer;" title="클릭시 홀로그램 달력 열기">📅 오늘 일정</h2>
            <button class="btn-add" id="btn-add-schedule">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
                <line x1="12" y1="14" x2="12" y2="18"></line>
                <line x1="10" y1="16" x2="14" y2="16"></line>
              </svg>
              <span>일정 추가</span>
            </button>
          </div>
          <div class="schedule-list" id="schedule-list">
            <!-- 자바스크립트로 동적 로드 -->
          </div>
        </section>

        <!-- 4번 테이블: 시스템 정보 -->
        <section class="card table-4">
          <div class="header-flex">
            <h2>⚙️ 시스템 정보</h2>
          </div>
          <div class="system-info-content">
            <p>🟢 시스템 상태: 정상</p>
            <p>💾 저장소: 활성화 (localStorage)</p>
            <hr>
            <p>📝 <strong>빠른 메모:</strong></p>
            <textarea id="quick-memo" placeholder="메모를 입력하세요..."></textarea>
          </div>
        </section>

      </div>
    </div>

  </div>

  <!-- 🔮 SF 홀로그램 달력 모달 -->
  <div id="calendar-modal" class="holo-modal-overlay hidden">
    <div class="holo-modal-card">
      <div class="holo-scanline"></div>
      
      <!-- 모달 상단 헤더 -->
      <div class="holo-header">
        <div class="holo-nav">
          <button id="cal-prev" class="holo-btn">&lt;</button>
          <span id="cal-year-month" class="holo-title">2026년 07월</span>
          <button id="cal-next" class="holo-btn">&gt;</button>
        </div>
        <button id="cal-close" class="holo-close-btn">&times;</button>
      </div>

      <!-- 달력 그리드 영역 -->
      <div class="holo-body">
        <div class="cal-weekdays">
          <span class="sun">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span class="sat">토</span>
        </div>
        <div id="cal-days-grid" class="cal-days-grid">
          <!-- 날짜 셀 자바스크립트로 생성 -->
        </div>

        <!-- 선택 날짜 일정 리스트 -->
        <div class="holo-schedule-section">
          <div class="holo-section-title">
            <span>📌 <span id="selected-date-text">2026-07-20</span> 일정 목록</span>
          </div>
          <div id="selected-schedule-list" class="holo-schedule-list">
            <!-- 클릭한 날짜의 일정 동적 표시 -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 🟧 주황색 사이버틱 홀로그램 모달 -->
<div id="scheduleModal" class="holo-modal-overlay hidden">
  <div class="holo-modal-card orange-theme">
    <div class="holo-scanline"></div>
    
    <!-- 1. 오른쪽 상단 X 버튼 제거 -->
    <div class="holo-header">
      <span class="holo-title">🌐 NEW SCHEDULE INPUT</span>
    </div>

    <form id="scheduleForm" onsubmit="handleScheduleSubmit(event)">
      <!-- 2. 날짜 선택 (클릭 시 달력 팝업) -->
      <div class="holo-form-group">
        <label for="schedDate">📅 DATE (날짜 선택)</label>
        <input type="date" id="schedDate" required />
      </div>

      <!-- 3. 시간 선택 (클릭 시 시계 팝업) -->
      <div class="holo-form-group">
        <label for="schedTime">⏰ TIME (시간 선택)</label>
        <input type="time" id="schedTime" required />
      </div>

      <!-- 5. 입력 항목 -->
      <div class="holo-form-group">
        <label for="schedTask">📝 TASK / EVENT (일정 내용)</label>
        <input type="text" id="schedTask" placeholder="일정을 입력하세요" required autocomplete="off" />
      </div>

      <!-- 4. 하단 긴 버튼 영역 -->
      <div class="holo-modal-footer">
        <button type="submit" class="holo-btn submit-btn">일정 추가</button>
        <button type="button" class="holo-btn cancel-btn" onclick="closeScheduleModal()">취소</button>
      </div>
    </form>
  </div>
</div>


  <!-- JS 연결 (중복 제거 및 올바른 순서 배치) -->
  <script src="js/secretary.js"></script>
  <script src="js/schedule.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
